# ──────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────────
# MockIQ — Full Stack Docker Compose
# Services: mongodb | api (FastAPI) | frontend (Next.js)
#
# Usage:
#   docker-compose up --build          # start everything
#   docker-compose up --build -d       # detached (background)
#   docker-compose down                # stop everything
#   docker-compose logs -f api         # tail backend logs
#   docker-compose logs -f frontend    # tail frontend logs
# ──────────────────────────────────────────────────────────────

services:

  # ── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mockiq_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mock_interview_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: mockiq_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      # Override MongoDB URL to use Docker service name
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: mock_interview_db
      # CORS — allow both host and container frontend
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    volumes:
      - reports_data:/app/generated_reports
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # In Docker, the client bundle built by Next.js runs in the user's browser, so it must point to the exposed localhost port
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: mockiq_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy

# ── Named Volumes ──────────────────────────────────────────
volumes:
  mongo_data:
    name: mockiq_mongo_data
  reports_data:
    name: mockiq_reports_data
